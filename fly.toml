# Fly.io configuration for Partnership Management Platform
# Run: fly launch --copy-config --no-deploy   (first time)
#      fly volumes create app_data --size 1 --region fra
#      fly secrets set ADMIN_PASSWORD="..." SESSION_SECRET="$(openssl rand -hex 32)"
#      fly deploy

app = "partnership-management"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[[mounts]]
  source = "app_data"
  destination = "/app/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "20s"
  method = "GET"
  path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
